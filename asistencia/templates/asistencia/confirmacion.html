<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Registrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 25%),
                linear-gradient(135deg, #0f766e, #1d4ed8);
        }

        .card {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
        }

        .status-badge {
            width: 110px;
            height: 110px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #166534;
            font-size: 3rem;
            font-weight: 700;
        }
    </style>
</head>
<body class="py-5 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-5 bg-white">
                    <div class="mb-4">
                        <span class="status-badge">OK</span>
                    </div>
                    <h1 class="h2 text-success fw-bold">Asistencia Registrada</h1>
                    <p class="text-muted fs-5">
                        Tu asistencia fue guardada correctamente en el sistema.
                    </p>
                    <a href="{% url 'registro_asistencia' %}" class="btn btn-primary mt-3">
                        Registrar otra asistencia
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
